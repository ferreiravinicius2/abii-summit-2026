<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0907">
<title>ABII Summit — Interactive Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap">

<!-- Firebase (compat SDK, no build step) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- Deck datasets (Commercial KPIs for Interaction 13) -->
<script src="abii-data.js"></script>
<!-- Full Commercial KPIs table (Ac 2025 / BGT 2026 / LE 2026) for Interaction 8 KPI Tracker -->
<script src="abii-comm-kpis.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#d4a843;--gold-l:#f0d68a;--gold-d:#b8902f;
  --bg:#000;--card:#111;--border:#222;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --txt:#ededed;--muted:#888;
  --blue:#3b82f6;--purple:#a855f7;--orange:#f97316;--cyan:#06b6d4;--pink:#ec4899;
}
html,body{height:100%;width:100%}
body{
  font-family:'Montserrat','Segoe UI',Arial,sans-serif;
  background:
    radial-gradient(ellipse 80% 60% at 30% 10%,rgba(212,168,67,.10) 0%,transparent 50%),
    radial-gradient(ellipse 60% 60% at 85% 90%,rgba(212,168,67,.06) 0%,transparent 50%),
    linear-gradient(180deg,#000 0%,#0a0907 50%,#050403 100%);
  color:var(--txt);
  min-height:100vh;
  font-weight:400;
  overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom);
}

/* ===== STICKY HEADER ===== */
.hdr{
  position:sticky;top:0;z-index:50;
  padding:10px 14px 12px;
  background:linear-gradient(180deg,rgba(0,0,0,.96),rgba(0,0,0,.82));
  border-bottom:1px solid rgba(212,168,67,.25);
  backdrop-filter:blur(10px);
  padding-top:calc(10px + env(safe-area-inset-top));
}
.hdr::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,.45) 30%,rgba(212,168,67,.6) 50%,rgba(212,168,67,.45) 70%,transparent);
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-brand{display:flex;align-items:center;gap:8px;min-width:0}
.hdr-crown{width:22px;height:auto;flex-shrink:0;filter:drop-shadow(0 0 5px rgba(212,168,67,.35))}
.hdr-titles{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.hdr-titles .corona{font-style:italic;color:var(--gold-l);font-weight:700;font-size:12px;letter-spacing:.03em}
.hdr-titles .summit{font-size:10px;color:#fff;letter-spacing:.22em;font-weight:800;text-transform:uppercase}
.counter{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:#000;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  padding:5px 10px;border-radius:4px;font-weight:800;letter-spacing:.08em;
  white-space:nowrap;flex-shrink:0;
}
.prog{margin-top:10px;height:4px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:3px;transition:width .35s ease}

/* ===== NETWORK STATUS ===== */
.net-chip{
  position:fixed;top:calc(56px + env(safe-area-inset-top));right:10px;z-index:60;
  font-size:10px;padding:3px 8px;border-radius:10px;
  background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.4);
  font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  display:none;
}
.net-chip.offline{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.4);display:inline-block}
.net-chip.queued{background:rgba(234,179,8,.15);color:#facc15;border-color:rgba(234,179,8,.4);display:inline-block}

/* ===== MAIN CONTENT ===== */
.main{padding:18px 14px 110px;max-width:520px;margin:0 auto}

.tag-pill{
  display:inline-block;color:#000;font-size:10px;text-transform:uppercase;
  letter-spacing:.22em;font-weight:800;
  padding:4px 11px;background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border-radius:3px;margin-bottom:10px;
  box-shadow:0 2px 6px rgba(212,168,67,.25);
}
.slide-ref{font-size:10px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}

h1.step-title{
  font-size:1.55em;font-weight:900;line-height:1.15;letter-spacing:-.01em;
  color:#fff;text-transform:uppercase;margin:4px 0 6px;
  position:relative;padding-bottom:10px;
}
h1.step-title::after{
  content:"";position:absolute;left:0;bottom:0;width:50px;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:2px;
}
.gold-grad{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.prompt{
  color:#ddd;font-size:.98em;line-height:1.5;margin-bottom:16px;
}
.prompt strong{color:#fff}
.hint{font-size:.78em;color:var(--muted);font-style:italic;margin-bottom:10px;line-height:1.5}

/* ===== CARDS ===== */
.card{
  background:linear-gradient(135deg,rgba(20,20,20,.9),rgba(10,10,10,.9));
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:14px 16px;
  margin-bottom:12px;
  backdrop-filter:blur(6px);
}
.card-gold{border-color:rgba(212,168,67,.45);background:linear-gradient(135deg,rgba(212,168,67,.11),rgba(212,168,67,.03));box-shadow:0 0 14px rgba(212,168,67,.08)}
.card-green{border-color:rgba(34,197,94,.45);background:linear-gradient(135deg,rgba(34,197,94,.09),rgba(34,197,94,.02))}
.card-red{border-color:rgba(239,68,68,.4);background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.02))}

/* ===== INPUTS ===== */
label.lbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;font-weight:700}
.inp{
  width:100%;background:rgba(15,15,15,.85);
  border:1px solid rgba(255,255,255,.15);
  border-radius:10px;padding:14px 14px;
  color:#fff;font-size:16px; /* 16px avoids iOS zoom */
  outline:none;font-family:inherit;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.15)}
textarea.inp{min-height:90px;resize:vertical;line-height:1.4}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:48px;min-width:48px;padding:12px 22px;
  border-radius:10px;cursor:pointer;
  font-family:inherit;font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  border:1px solid #333;background:rgba(255,255,255,.02);color:#ddd;
  transition:transform .12s, background .2s, border-color .2s;
  user-select:none;-webkit-user-select:none;
}
.btn:active{transform:scale(.97)}
.btn-fill{
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#000;border:none;
  box-shadow:0 4px 14px rgba(212,168,67,.35);
}
.btn-fill:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:transparent;border:1px solid rgba(212,168,67,.45);color:var(--gold)}
.btn-wide{width:100%}

.nav-row{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,rgba(0,0,0,.96),rgba(0,0,0,.78));
  border-top:1px solid rgba(212,168,67,.25);
  backdrop-filter:blur(10px);
  display:flex;gap:10px;align-items:center;justify-content:space-between;
}
.nav-row .btn{flex:1}

/* ===== QUIZ OPTIONS ===== */
.opt{
  display:block;width:100%;text-align:left;
  padding:14px 16px;margin-bottom:10px;
  background:linear-gradient(135deg,rgba(20,20,20,.85),rgba(10,10,10,.85));
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;color:#ededed;cursor:pointer;
  font-size:15px;line-height:1.35;font-family:inherit;
  transition:transform .12s,border-color .2s,background .2s;
  min-height:52px;
}
.opt:active{transform:scale(.985)}
.opt .letter{display:inline-block;width:22px;color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;margin-right:2px}
.opt.sel{border-color:var(--gold);background:linear-gradient(135deg,rgba(212,168,67,.18),rgba(212,168,67,.05));box-shadow:0 0 10px rgba(212,168,67,.15)}
.opt.correct{border-color:#22c55e;background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(34,197,94,.04))}
.opt.wrong{border-color:#ef4444;background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(239,68,68,.04))}
.opt.disabled{pointer-events:none;opacity:.9}
.opt .mark{float:right;font-weight:800;margin-left:8px}

/* Y/N toggle */
.yn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.yn{
  min-height:56px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
  background:rgba(15,15,15,.85);color:#fff;font-weight:800;font-size:15px;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  transition:transform .12s,border-color .2s,background .2s;
}
.yn:active{transform:scale(.97)}
.yn.sel-yes{border-color:#22c55e;background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(34,197,94,.06));color:#4ade80}
.yn.sel-no{border-color:#ef4444;background:linear-gradient(135deg,rgba(239,68,68,.2),rgba(239,68,68,.06));color:#f87171}

/* Country chips */
.country-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.country-btn{
  padding:9px 14px;
  background:linear-gradient(135deg,rgba(20,20,20,.85),rgba(10,10,10,.85));
  border:1px solid rgba(255,255,255,.14);border-radius:22px;
  color:#ededed;cursor:pointer;font-size:13px;font-weight:600;
  font-family:inherit;transition:.15s;min-height:38px;
}
.country-btn:active{transform:scale(.97)}
.country-btn.active{border-color:var(--gold);background:linear-gradient(135deg,rgba(212,168,67,.2),rgba(212,168,67,.08));color:var(--gold);box-shadow:0 0 10px rgba(212,168,67,.2)}
.country-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.22em;margin:12px 0 4px;font-weight:800}

.kpi-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;margin-top:10px;background:rgba(8,8,8,.6);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.07)}
.kpi-table th{text-align:left;padding:9px 10px;color:#000;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold-l))}
.kpi-table td{padding:8px 10px;color:#ddd;border-bottom:1px solid rgba(255,255,255,.05)}
.kpi-table tr:last-child td{border-bottom:none}
.kpi-table .nm{font-weight:600;color:#fff}
.kpi-table .num{font-family:'JetBrains Mono',monospace;font-size:11px;color:#ddd}

/* Feedback card */
.feedback{
  margin-top:14px;padding:12px 14px;border-radius:10px;
  border:1px solid rgba(212,168,67,.45);
  background:linear-gradient(135deg,rgba(212,168,67,.12),rgba(212,168,67,.03));
}
.feedback.correct{border-color:rgba(34,197,94,.5);background:linear-gradient(135deg,rgba(34,197,94,.14),rgba(34,197,94,.03))}
.feedback.wrong{border-color:rgba(239,68,68,.5);background:linear-gradient(135deg,rgba(239,68,68,.14),rgba(239,68,68,.03))}
.feedback .head{font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.feedback.correct .head{color:#4ade80}
.feedback.wrong .head{color:#f87171}
.feedback:not(.correct):not(.wrong) .head{color:var(--gold)}
.feedback p{font-size:13px;color:#ddd;line-height:1.45}

/* Success state */
.submitted{
  text-align:center;padding:26px 18px;
  border-radius:14px;
  border:1px solid rgba(34,197,94,.45);
  background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(34,197,94,.02));
}
.submitted .chk{
  width:56px;height:56px;border-radius:50%;margin:0 auto 10px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#052e16;font-weight:900;
  box-shadow:0 4px 18px rgba(34,197,94,.4);
}
.submitted h2{font-size:1.15em;color:#4ade80;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;font-weight:800}
.submitted p{font-size:13px;color:#bbb;line-height:1.4}
.submitted .your-answer{
  margin-top:14px;padding:10px 12px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:8px;
  text-align:left;font-size:13px;color:#ddd;line-height:1.45;word-break:break-word;
}

/* Grid for multi-question screens */
.qblock{margin-bottom:18px}
.qblock .qnum{font-size:10px;color:var(--gold);letter-spacing:.22em;font-weight:800;text-transform:uppercase;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.qblock .qtxt{font-weight:700;color:#fff;margin-bottom:10px;font-size:15px;line-height:1.35}

/* Welcome */
.welcome-hero{
  text-align:center;padding:30px 10px 10px;
}
.welcome-hero .logo{
  width:64px;height:64px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(212,168,67,.35);
}
.welcome-hero .logo svg{width:36px;height:auto}
.welcome-hero h1{font-size:1.9em;font-weight:900;color:#fff;line-height:1.1;margin-bottom:8px;letter-spacing:-.01em}
.welcome-hero h1 .b{display:block;font-size:.55em;color:var(--gold);letter-spacing:.3em;margin-bottom:6px;font-weight:700}
.welcome-hero p{color:#bbb;font-size:14px;line-height:1.5;margin-top:12px}

.controls-hint{
  margin-top:18px;padding:12px 14px;
  background:rgba(212,168,67,.07);border:1px solid rgba(212,168,67,.25);border-radius:10px;
  font-size:12px;color:#ccc;line-height:1.5;
}
.controls-hint strong{color:var(--gold)}

/* 36/86 commitment cards (interaction 16 replicates the deck slide) */
.commit-grid{display:flex;flex-direction:column;gap:10px}
.commit-card{padding:14px 16px;border-radius:12px;border:1px solid}
.commit-card.stop{border-color:rgba(239,68,68,.5);background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.02))}
.commit-card.start{border-color:rgba(34,197,94,.5);background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(34,197,94,.02))}
.commit-card.track{border-color:rgba(212,168,67,.5);background:linear-gradient(135deg,rgba(212,168,67,.1),rgba(212,168,67,.02))}
.commit-card h3{font-size:12px;letter-spacing:.22em;font-weight:800;text-transform:uppercase;margin-bottom:4px}
.commit-card.stop h3{color:#f87171}
.commit-card.start h3{color:#4ade80}
.commit-card.track h3{color:var(--gold)}
.commit-card .sub{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4}

/* Toast */
.toast{
  position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(20px);
  opacity:0;pointer-events:none;
  background:rgba(20,20,20,.97);color:#fff;
  border:1px solid rgba(212,168,67,.45);
  padding:10px 16px;border-radius:24px;
  font-size:13px;font-weight:600;letter-spacing:.03em;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
  transition:opacity .25s,transform .25s;z-index:100;
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* dot-pager */
.dots{display:flex;gap:4px;justify-content:center;margin-top:10px;flex-wrap:wrap;max-width:320px;margin-left:auto;margin-right:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#333;transition:.2s;cursor:pointer;border:none;padding:0}
.dot.done{background:#4a6b37}
.dot.cur{background:var(--gold);box-shadow:0 0 8px rgba(212,168,67,.7);transform:scale(1.3)}

/* Accessibility: focus rings */
button:focus-visible,.inp:focus-visible,.opt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

@media (max-width:360px){
  .main{padding:16px 10px 110px}
  h1.step-title{font-size:1.35em}
  .opt{font-size:14px;padding:13px 14px}
}

@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>

<!-- ============================================= -->
<!-- STICKY HEADER                                  -->
<!-- ============================================= -->
<header class="hdr" role="banner">
  <div class="hdr-top">
    <div class="hdr-brand">
      <svg class="hdr-crown" viewBox="0 0 64 46" aria-hidden="true">
        <path d="M4 38 L12 14 L18 22 L24 8 L32 24 L40 8 L46 22 L52 14 L60 38 Z" fill="#d4a843" stroke="#b8902f" stroke-width=".5"/>
        <path d="M4 38 h56 v4 H4 z" fill="#d4a843"/>
        <circle cx="24" cy="12" r="1.8" fill="#b8902f"/>
        <circle cx="32" cy="8" r="2" fill="#b8902f"/>
        <circle cx="40" cy="12" r="1.8" fill="#b8902f"/>
      </svg>
      <div class="hdr-titles">
        <span class="corona">Corona</span>
        <span class="summit">ABII Summit</span>
      </div>
    </div>
    <div class="counter" id="counter" aria-live="polite">Interaction 1 / 16</div>
  </div>
  <div class="prog" aria-hidden="true"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</header>

<div class="net-chip" id="netChip">Offline</div>

<!-- ============================================= -->
<!-- MAIN AREA                                      -->
<!-- ============================================= -->
<main class="main" id="mainArea">
  <!-- dynamically rendered -->
</main>

<!-- ============================================= -->
<!-- BOTTOM NAV                                     -->
<!-- ============================================= -->
<nav class="nav-row" role="navigation" aria-label="Interaction navigation">
  <button class="btn" id="backBtn" type="button" aria-label="Previous interaction">&larr; Back</button>
  <button class="btn btn-fill" id="nextBtn" type="button" aria-label="Next interaction">Next &rarr;</button>
</nav>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>

  projectId: "abii-summit",

// Session id from URL (?s=abii-2026) or default.
const SESSION_ID = new URLSearchParams(location.search).get('s') || 'abii-2026';
const STORAGE_KEY = 'abii_summit_' + SESSION_ID;

// Cross-tab local sync channel (works when opened via same origin incl. file://)
const BC = (typeof BroadcastChannel !== 'undefined') ? new BroadcastChannel('abii_' + SESSION_ID) : null;

const STATE = {

  db: null,          // firebase db ref (or null if offline)
  queue: [],         // pending writes

function uuidv4(){
  // RFC4122 v4 (works without crypto.randomUUID on older browsers)
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);
  });
}

function loadLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {};
    return JSON.parse(raw);
  }catch(e){return {}}
}
function saveLocal(){
  const payload = {uuid:STATE.uuid, answers:STATE.answers, cur:STATE.cur};
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); }catch(e){}
}

// Reset this device's previous responses every time the page loads.
// Per facilitator request: reopening attendees.html must always start at Interaction 1 with no saved answers.
// We also:
//   • Generate a FRESH uuid so this session does not overwrite/collide with an older entry on the dashboard.
//   • Wipe the previous uuid's rows from the shared bucket (so the dashboard doesn't keep showing stale answers
//     from the same device). Other attendees' answers in that bucket are preserved.
(function freshStart(){
  const prev = loadLocal();
  const oldUuid = prev && prev.uuid;
  if(oldUuid){
    try{
      const bucketKey = 'abii_bucket_' + SESSION_ID;
      const bucket = JSON.parse(localStorage.getItem(bucketKey) || '{}');
      let dirty = false;
      Object.keys(bucket).forEach(iKey=>{
        if(bucket[iKey] && bucket[iKey][oldUuid]){
          delete bucket[iKey][oldUuid];
          dirty = true;
        }
      });
      if(dirty) localStorage.setItem(bucketKey, JSON.stringify(bucket));
    }catch(e){}
    try{ if(BC) BC.postMessage({type:'reset-uuid', uuid: oldUuid}); }catch(e){}
  }
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  STATE.uuid = uuidv4();
  STATE.answers = {};
  STATE.cur = 0;
  saveLocal();
})();

// FIREBASE INIT (graceful fallback)
// =========================================================
function initFirebase(){
  try{
    if(!window.firebase) throw new Error('SDK missing');
    // Skip init with obviously placeholder key (demo mode)
    if(FIREBASE_CONFIG.apiKey.includes('Demo-Replace')){
      console.info('[ABII] Firebase demo placeholder detected — running in local-only mode.');
      return null;
    }
    const app = firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database(app);
    // Touch a node to validate connectivity
    db.ref('.info/connected').on('value', snap=>{
      STATE.online = !!snap.val();
      updateNetChip();
      if(STATE.online) flushQueue();
    });
    return db;
  }catch(e){
    console.warn('[ABII] Firebase init failed, running local-only:', e.message);
    return null;
  }
}
STATE.db = initFirebase();

function updateNetChip(){
  const chip = document.getElementById('netChip');
  chip.classList.remove('offline','queued');
  chip.style.display = 'none';
  if(!STATE.db){
    chip.textContent = 'Local mode';
    chip.classList.add('queued');
  }else if(!STATE.online){
    chip.textContent = 'Offline — will retry';
    chip.classList.add('offline');
  }else if(STATE.queue.length){
    chip.textContent = 'Syncing…';
    chip.classList.add('queued');
  }
}
window.addEventListener('online', ()=>{STATE.online=true;updateNetChip();flushQueue()});
window.addEventListener('offline',()=>{STATE.online=false;updateNetChip()});

// Queue + retry
function enqueueWrite(path, data){
  STATE.queue.push({path, data});
  saveLocal();
  updateNetChip();
  flushQueue();
}
async function flushQueue(){
  if(!STATE.db || !STATE.online || !STATE.queue.length) return;
  const pending = STATE.queue.slice();
  for(const item of pending){
    try{
      await STATE.db.ref(item.path).set(item.data);
      STATE.queue = STATE.queue.filter(x=>x!==item);
      saveLocal();
    }catch(e){
      console.warn('[ABII] write failed, will retry:', e.message);
      break;
    }
  }
  updateNetChip();
}

// =========================================================
// SUBMIT (central API)
// =========================================================
// SCALE: guards against rage-clicks — when 100 people press Submit at the
// same time, blocking duplicate writes on the same iKey within 700ms keeps
// each device to one Firebase write per interaction.
const _SUBMIT_INFLIGHT = Object.create(null);
function submitAnswer(iKey, payload, opts){
  opts = opts || {};
  const now = Date.now();
  if(_SUBMIT_INFLIGHT[iKey] && (now - _SUBMIT_INFLIGHT[iKey]) < 700) return;
  _SUBMIT_INFLIGHT[iKey] = now;
  const data = Object.assign({ts: now, uuid: STATE.uuid}, payload);
  STATE.answers[iKey] = data;
  saveLocal();

  // 1) Write to shared localStorage bucket FIRST (what the dashboard reads on every poll
  //    and on 'storage' events — must exist before we broadcast).
  let bucketWriteOk = false;
  try{
    const bucketKey = 'abii_bucket_' + SESSION_ID;
    const bucket = JSON.parse(localStorage.getItem(bucketKey) || '{}');
    if(!bucket[iKey]) bucket[iKey] = {};
    bucket[iKey][STATE.uuid] = data;
    localStorage.setItem(bucketKey, JSON.stringify(bucket));
    bucketWriteOk = true;
  }catch(e){
    console.warn('[ABII] shared bucket write failed:', e.message);
  }

  // 2) Instant cross-tab push (dashboard on the same origin reacts in <50ms).
  try{
    if(BC) BC.postMessage({type:'submit', session:SESSION_ID, iKey, uuid:STATE.uuid, data});
  }catch(e){}

  // 3) Firebase Realtime DB (authoritative when configured).
  const path = `sessions/${SESSION_ID}/${iKey}/${STATE.uuid}`;
  if(STATE.db && STATE.online){
    STATE.db.ref(path).set(data).catch(()=>enqueueWrite(path,data));
  }else{
    enqueueWrite(path, data);
  }

  if(!opts.silent){
    renderSlide();
    showToast(bucketWriteOk ? 'Answer submitted' : 'Submitted (storage blocked)');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 1800);
}

                ${['Increase','Decrease','Keep as is'].map(act=>{

// =========================================================
// SHARED RENDER HELPERS
// =========================================================
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function successBlock(title, subHtml){
  return `
    <div class="submitted" role="status">
      <div class="chk">✓</div>
      <h2>${title}</h2>
      <p>You can relax — wait for the facilitator's next cue.</p>
      ${subHtml ? `<div class="your-answer">${subHtml}</div>` : ''}
    </div>
  `;
}

function renderOptList(group, options, picked){
  return options.map((o,idx)=>{
    const letter = String.fromCharCode(65+idx);
    const isPicked = picked && picked.idx === idx;
    const cls = 'opt' + (isPicked ? ' sel' : '');
    return `<button type="button" class="${cls}" data-group="${group}" data-idx="${idx}" data-letter="${letter}" data-correct="${o.c?1:0}">
      <span class="letter">${letter}.</span> ${o.t}
    </button>`;
  }).join('');
}

function multiOptBlock(group, qnum, qtext, options, picked){
  return `
    <div class="qblock">
      <div class="qnum">${qnum}</div>
      <div class="qtxt">${qtext}</div>
      ${options.map((o,idx)=>{
        const letter = String.fromCharCode(65+idx);
        const isPicked = picked && picked.idx === idx;
        const cls = 'opt' + (isPicked ? ' sel' : '');
        return `<button type="button" class="${cls}" data-i9="${group.toLowerCase()}" data-idx="${idx}" data-correct="${o.c?1:0}" data-letter="${letter}">
          <span class="letter">${letter}.</span> ${o.t}
        </button>`;
      }).join('')}
    </div>
  `;
}

function quizBlock(questionHtml, options, answered, feedback){
  if(answered){
    const picked = answered.idx;
    const isCorrect = !!answered.correct;
    return `
      <p class="prompt">${questionHtml}</p>
      <div>
        ${options.map((o,idx)=>{
          const letter = String.fromCharCode(65+idx);
          let cls = 'opt disabled';
          if(o.c) cls += ' correct';
          if(idx === picked && !o.c) cls += ' wrong';
          if(idx === picked && o.c) cls += ' sel';
          const mark = o.c ? '<span class="mark" style="color:#4ade80">✓</span>' : (idx===picked?'<span class="mark" style="color:#f87171">✗</span>':'');
          return `<div class="${cls}"><span class="letter">${letter}.</span> ${o.t}${mark}</div>`;
        }).join('')}
      </div>
      <div class="feedback ${isCorrect?'correct':'wrong'}">
        <div class="head">${isCorrect?'Correct':'Not quite'}</div>
        <p>${feedback}</p>
      </div>
    `;
  }
  const picked = STATE._tmp_quiz || {};
  const curPick = picked[STATE.cur];
  return `
    <p class="prompt">${questionHtml}</p>
    <div id="opts">
      ${options.map((o,idx)=>{
        const letter = String.fromCharCode(65+idx);
        const isPicked = curPick && curPick.idx === idx;
        const cls = 'opt' + (isPicked ? ' sel' : '');
        return `<button type="button" class="${cls}" data-quiz-idx="${idx}" data-correct="${o.c?1:0}" data-letter="${letter}">
          <span class="letter">${letter}.</span> ${o.t}
        </button>`;
      }).join('')}
    </div>
    <button class="btn btn-fill btn-wide" id="quiz-submit" type="button" ${!curPick?'disabled':''}>Submit answer</button>
  `;
}

function bindQuiz(iKey){
  if(!STATE._tmp_quiz) STATE._tmp_quiz = {};
  document.querySelectorAll('[data-quiz-idx]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      STATE._tmp_quiz[STATE.cur] = {
        idx: +btn.dataset.quizIdx,
        letter: btn.dataset.letter,
        correct: btn.dataset.correct === '1'
      };
      renderSlide();
    });
  });
  const s = document.getElementById('quiz-submit');
  if(s) s.addEventListener('click', ()=>{
    const pick = STATE._tmp_quiz[STATE.cur];
    if(!pick) return showToast('Select an answer first');
    submitAnswer(iKey, pick);
    if(STATE._tmp_quiz) delete STATE._tmp_quiz[STATE.cur];
  });
}

function countryPicker(iKey, selected){
  return `<div class="country-label">Select your country</div>
  <div class="country-grid" role="list">
    ${COUNTRY_LIST.map(c=>`<button type="button" role="listitem" class="country-btn ${selected===c?'active':''}" data-country="${c}" data-pick="${iKey}">${c}</button>`).join('')}
  </div>`;
}

function countryTable(country){
  const d = KPI_DATA[country];
  if(!d) return '';
  return `
    <div class="card card-gold" style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <strong style="color:#fff;font-size:15px">${country}</strong>
        <span style="font-size:10px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;font-weight:800">On-Trade POCs</span>
      </div>
      <table class="kpi-table" aria-label="AC 2025 BGT 2026 LE 2026 for ${country}">
        <tr><th>AC 2025</th><th>BGT 2026</th><th>LE 2026</th></tr>
        <tr>
          <td class="num">${fmtNum(d.ac25)}</td>
          <td class="num">${fmtNum(d.bgt26)}</td>
          <td class="num">${fmtNum(d.le26)}</td>
        </tr>
      </table>
    </div>
  `;
}

function bindCountryPicker(iKey){
  document.querySelectorAll('[data-pick="'+iKey+'"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      STATE['_tmp_'+iKey] = btn.dataset.country;
      renderSlide();
    });
  });
  const s = document.getElementById(iKey+'-submit');
  if(s) s.addEventListener('click', ()=>{
    const country = STATE['_tmp_'+iKey];
    if(!country) return showToast('Pick a country first');
    const d = KPI_DATA[country];
    submitAnswer(iKey, Object.assign({country}, d));
    delete STATE['_tmp_'+iKey];
  });
}

// =========================================================
// MASTER RENDER
// =========================================================
let _lastSlideIdx = -1;
function renderSlide(){
  const area = document.getElementById('mainArea');
  const n = INTERACTIONS.length;

  const interaction = INTERACTIONS[STATE.cur];
  if(!interaction) return;

  document.getElementById('counter').textContent = `Interaction ${STATE.cur+1} / ${n}`;
  document.getElementById('progFill').style.width = `${Math.round(((STATE.cur+1)/n)*100)}%`;

  // Preserve scroll position across in-slide re-renders (option clicks, input typing).
  // Only scroll to top when actually navigating to a different slide.
  const isSlideChange = _lastSlideIdx !== STATE.cur;
  const savedScroll = isSlideChange ? 0 : (window.scrollY || window.pageYOffset || 0);

  area.innerHTML = `
    <div class="slide-ref">${interaction.tag} &middot; Slide ${interaction.slide}</div>
    <div class="tag-pill">${interaction.tag}</div>
    <h1 class="step-title">${interaction.title}</h1>
    ${interaction.render()}
  `;
  interaction.bind && interaction.bind();

  // Nav buttons
  const backBtn = document.getElementById('backBtn');
  const nextBtn = document.getElementById('nextBtn');
  backBtn.disabled = (STATE.cur === 0);
  nextBtn.disabled = (STATE.cur === n-1);
  backBtn.style.opacity = backBtn.disabled ? '.35' : '1';
  nextBtn.style.opacity = nextBtn.disabled ? '.35' : '1';

  if(isSlideChange){
    window.scrollTo({top:0, behavior:'smooth'});
  } else {
    // Restore scroll silently to avoid the jump-to-top flicker.
    window.scrollTo({top:savedScroll, behavior:'instant'});
  }
  _lastSlideIdx = STATE.cur;
  saveLocal();
}

document.getElementById('backBtn').addEventListener('click', ()=>{
  if(STATE.cur > 0){ STATE.cur--; renderSlide(); }
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  if(STATE.cur < INTERACTIONS.length-1){ STATE.cur++; renderSlide(); }
});

// Keyboard accessibility (desktop rehearsal)
document.addEventListener('keydown', e=>{
  if(e.target && ['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.key === 'ArrowRight' && STATE.cur < INTERACTIONS.length-1){ STATE.cur++; renderSlide(); }
  if(e.key === 'ArrowLeft'  && STATE.cur > 0){ STATE.cur--; renderSlide(); }
});

updateNetChip();
renderSlide();

// Expose for debugging only
window.ABII = {STATE, INTERACTIONS, SESSION_ID, FIREBASE_CONFIG};
</script>
