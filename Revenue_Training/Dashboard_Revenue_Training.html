<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Training — Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap">

<!--
  =====================================================================
  STANDALONE DASHBOARD — Revenue Training.
  Paired ONLY with Attendees_Revenue_Training.html in the same folder.
  Reads from:
    * Firebase path: revenue_training/<session>/<qKey>/<uuid>
    * LocalStorage bucket: revtrn_bucket_<session>
    * BroadcastChannel: revtrn_<session>
  Does NOT share any keys, listeners or styles with the parent project
  (abii-2026 session, abii_bucket_*, abii_* channel). Never edit those.
  =====================================================================
-->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#d4a843;--gold-l:#f0d68a;--gold-d:#b8902f;
  --bg:#000;--card:#111;--border:#222;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --txt:#ededed;--muted:#888;
  --blue:#3b82f6;--purple:#a855f7;--orange:#f97316;--cyan:#06b6d4;--pink:#ec4899;
}
body{
  font-family:'Montserrat','Segoe UI',Arial,sans-serif;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%,rgba(212,168,67,.08) 0%,transparent 50%),
    radial-gradient(ellipse 60% 60% at 85% 85%,rgba(212,168,67,.05) 0%,transparent 50%),
    linear-gradient(180deg,#000 0%,#0a0907 50%,#050403 100%);
  color:var(--txt);min-height:100vh;font-weight:400;
}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px;position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,rgba(0,0,0,.94),rgba(0,0,0,.8));
  border-bottom:1px solid rgba(212,168,67,.2);
  backdrop-filter:blur(12px);
}
.topbar::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,.35) 20%,rgba(212,168,67,.5) 50%,rgba(212,168,67,.35) 80%,transparent);
}
.brand{color:var(--gold);font-weight:800;font-size:13px;letter-spacing:.28em;text-transform:uppercase}
.section{color:#aaa;font-size:11px;margin-left:14px;text-transform:uppercase;letter-spacing:.15em}
.right{display:flex;align-items:center;gap:14px}
.live-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 0 0 rgba(34,197,94,.7);animation:pulse 1.6s infinite;
}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.7)}70%{box-shadow:0 0 0 12px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.status-chip{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;color:#aaa;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);padding:4px 12px;border-radius:4px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;
}
.status-chip.bad {color:#f87171;border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08)}
.status-chip.warn{color:#facc15;border-color:rgba(234,179,8,.35);background:rgba(234,179,8,.08)}

.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 60px)}
.sidenav{
  padding:20px 14px;border-right:1px solid rgba(212,168,67,.15);
  background:rgba(5,5,5,.7);backdrop-filter:blur(6px);
  height:calc(100vh - 60px);position:sticky;top:60px;overflow-y:auto;
}
.sidenav h4{font-size:10px;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;margin-bottom:10px;font-weight:800}
.nav-btn{
  display:block;width:100%;text-align:left;
  padding:10px 12px;margin-bottom:6px;
  background:transparent;border:1px solid transparent;border-radius:6px;
  color:#aaa;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;
  transition:.15s;letter-spacing:.02em;
}
.nav-btn:hover{color:#fff;background:rgba(212,168,67,.06);border-color:rgba(212,168,67,.2)}
.nav-btn.active{color:var(--gold);background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.45);box-shadow:0 0 10px rgba(212,168,67,.12)}
.nav-btn .ix{display:inline-block;width:28px;color:#666;font-family:'JetBrains Mono',monospace;font-weight:700}
.nav-btn.active .ix{color:var(--gold)}
.nav-btn .meta{display:block;margin-top:3px;font-size:10px;color:#666;letter-spacing:.05em;font-weight:500}
.nav-btn.active .meta{color:#d4a843cc}
.resp-count{
  margin-top:18px;padding:10px 12px;
  background:linear-gradient(135deg,rgba(212,168,67,.12),rgba(212,168,67,.03));
  border:1px solid rgba(212,168,67,.3);border-radius:8px;
}
.resp-count .lbl{font-size:10px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;font-weight:800;margin-bottom:4px}
.resp-count .val{font-size:22px;font-weight:900;color:#fff;font-family:'JetBrains Mono',monospace}

.main{padding:28px 36px 60px;max-width:1400px}
.tag-pill{display:inline-block;color:#000;font-size:11px;text-transform:uppercase;letter-spacing:.22em;font-weight:800;padding:4px 12px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border-radius:3px;margin-bottom:10px;box-shadow:0 2px 6px rgba(212,168,67,.25)}
.qref{font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
h1.section-title{
  font-size:2.4em;font-weight:900;line-height:1.08;letter-spacing:-.01em;
  color:#fff;text-transform:uppercase;margin:8px 0 18px;
  position:relative;padding-bottom:14px;
}
h1.section-title::after{
  content:"";position:absolute;left:0;bottom:0;width:72px;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:2px;
}
.gold-grad{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub-prompt{color:#bbb;font-size:14px;margin-bottom:22px;line-height:1.5;max-width:900px;font-style:italic}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{
  background:linear-gradient(135deg,rgba(20,20,20,.85),rgba(10,10,10,.85));
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:22px 24px;margin-bottom:18px;backdrop-filter:blur(8px);
}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);font-weight:800;margin-bottom:14px}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:22px}
.kpi-box{
  padding:18px 20px;border-radius:10px;
  background:linear-gradient(135deg,rgba(20,20,20,.9),rgba(10,10,10,.9));
  border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden;
}
.kpi-box::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.kpi-box .lbl{font-size:10px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.kpi-box .val{font-size:2em;font-weight:900;color:#fff;font-family:'JetBrains Mono',monospace;line-height:1.05}
.kpi-box .sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.04em}
.kpi-box.green::before{background:linear-gradient(90deg,var(--green),#4ade80)}
.kpi-box.green .val{color:#4ade80}
.kpi-box.blue::before{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.kpi-box.blue .val{color:#60a5fa}
.kpi-box.red::before{background:linear-gradient(90deg,var(--red),#f87171)}
.kpi-box.red .val{color:#f87171}
.kpi-box.yellow::before{background:linear-gradient(90deg,#eab308,#facc15)}
.kpi-box.yellow .val{color:#facc15}
.kpi-box.neutral::before{background:linear-gradient(90deg,#444,#666)}

.bar-list{display:flex;flex-direction:column;gap:12px}
.bar-row{display:grid;grid-template-columns:minmax(280px,1.3fr) 3fr 120px;gap:14px;align-items:center}
.bar-row .lbl{font-size:14px;color:#ddd;font-weight:600;line-height:1.3}
.bar-row .lbl .letter{color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:800;margin-right:6px}
.bar-row .pct{font-size:14px;color:#fff;font-weight:800;text-align:right;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.bar-track{height:22px;background:rgba(255,255,255,.06);border-radius:11px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:11px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:800;color:#000;font-family:'JetBrains Mono',monospace;min-width:0}
.bar-fill.gold  {background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.bar-fill.green {background:linear-gradient(90deg,var(--green),#4ade80);color:#04140a}
.bar-fill.red   {background:linear-gradient(90deg,var(--red),#f87171);color:#fff}
.bar-fill.blue  {background:linear-gradient(90deg,#3b82f6,#60a5fa);color:#fff}
.bar-fill.purple{background:linear-gradient(90deg,#a855f7,#c084fc);color:#fff}
.bar-fill.orange{background:linear-gradient(90deg,#f97316,#fb923c);color:#fff}
.bar-fill.cyan  {background:linear-gradient(90deg,#06b6d4,#22d3ee);color:#04140a}

.empty-state{
  text-align:center;padding:60px 30px;border-radius:12px;
  border:1px dashed rgba(212,168,67,.3);background:rgba(15,15,15,.4);
  color:#888;font-size:14px;
}
.empty-state .big{font-size:3em;display:block;margin-bottom:12px;opacity:.4}

.reset-ctrl{
  margin-top:28px;padding:14px 18px;border-radius:10px;
  background:rgba(15,15,15,.55);border:1px solid rgba(255,255,255,.08);
}
.reset-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.reset-head h4{font-size:11px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;font-weight:800}
.reset-hint{font-size:11px;color:var(--muted);font-style:italic;max-width:540px;line-height:1.4}
.reset-row{display:flex;gap:10px;flex-wrap:wrap}
.reset-btn{
  padding:9px 16px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.04);color:#ccc;cursor:pointer;
  font-family:inherit;transition:.15s;
}
.reset-btn:hover{background:rgba(212,168,67,.1);color:var(--gold);border-color:rgba(212,168,67,.4)}
.reset-btn.danger{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.08);color:#f87171}
.reset-btn.danger:hover{background:rgba(239,68,68,.22);color:#fff;border-color:#f87171}

@media (max-width:1100px){
  .layout{grid-template-columns:1fr}
  .sidenav{position:static;height:auto;border-right:none;border-bottom:1px solid rgba(212,168,67,.15)}
  .main{padding:20px 18px 60px}
  .grid2{grid-template-columns:1fr}
  .bar-row{grid-template-columns:1fr; gap:6px}
  .bar-row .pct{text-align:left}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <span class="brand">Revenue Training</span>
    <span class="section">Live Dashboard</span>
  </div>
  <div class="right">
    <span class="status-chip" id="statusChip"><span class="live-dot"></span> <span id="statusText">Connecting\u2026</span></span>
    <span class="status-chip" id="sessionChip"><span id="sessionText">session: revenue-training-2026</span></span>
  </div>
</div>

<div class="layout">
  <aside class="sidenav" aria-label="Questions">
    <h4>Questions</h4>
    <div id="navList"></div>
    <div class="resp-count">
      <div class="lbl">Unique attendees</div>
      <div class="val" id="uniqueCount">0</div>
    </div>
  </aside>
  <main class="main" id="mainArea"></main>
</div>

<script>
// =====================================================================
// CONFIG — isolated namespace (does NOT share data with abii-2026 pages).
// =====================================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB05xedHIpWCfEoFrAldxrTKAcRz2eBntk",
  authDomain: "abii-summit.firebaseapp.com",
  databaseURL: "https://abii-summit-default-rtdb.firebaseio.com",
  projectId: "abii-summit",
  storageBucket: "abii-summit.firebasestorage.app",
  messagingSenderId: "446056292778",
  appId: "1:446056292778:web:971fe1adc58c7f07ab0bd3",
  measurementId: "G-1937VJ27ZR"
};

const PARAMS     = new URLSearchParams(location.search);
const SESSION_ID = PARAMS.get('s') || 'revenue-training-2026';
const BUCKET_KEY = 'revtrn_bucket_' + SESSION_ID;
const BC_NAME    = 'revtrn_'        + SESSION_ID;
const FB_ROOT    = `revenue_training/${SESSION_ID}`;

document.getElementById('sessionText').textContent = 'session: ' + SESSION_ID;

// Same 2 questions used by Attendees_Revenue_Training.html.
// Colors per option are visual only — no right/wrong answer here.
const QUESTIONS = [
  {
    key:'q1',
    tag:'Price Index',
    title:'How is <span class="gold-grad">Corona\u2019s Price Index</span> in your market?',
    subPrompt:'No right answer — we want to see how perceptions vary across markets.',
    options:[
      {letter:'A', label:'Above the Ideal Range',  color:'red'},
      {letter:'B', label:'In the Ideal Range',     color:'green'},
      {letter:'C', label:'Below the Ideal Range',  color:'blue'}
    ]
  },
  {
    key:'q2',
    tag:'Hero SKU mix',
    title:'How much of our <span class="gold-grad">total Corona volume</span> comes from the Hero SKU?',
    subPrompt:'Everyone\u2019s estimate — we\u2019re looking at the spread of opinions, not accuracy.',
    options:[
      {letter:'A', label:'~10%', color:'gold'},
      {letter:'B', label:'~25%', color:'cyan'},
      {letter:'C', label:'~50%', color:'blue'},
      {letter:'D', label:'~60%', color:'orange'},
      {letter:'E', label:'>60%', color:'purple'}
    ]
  }
];

// =====================================================================
// STATE
// =====================================================================
const STATE = {
  db:null, online:false,
  cur:0,
  data:{ q1:{}, q2:{} },   // {qKey: {uuid: record}}
  localPoll:null,
  bc:null
};

function setStatus(text, cls){
  document.getElementById('statusText').textContent = text;
  const chip = document.getElementById('statusChip');
  chip.classList.remove('bad','warn');
  if(cls) chip.classList.add(cls);
}

// --- LOCAL SYNC (shared bucket + BroadcastChannel + storage events) -----
function pullLocal(){
  try{
    const bucket = JSON.parse(localStorage.getItem(BUCKET_KEY) || '{}');
    if(STATE.db){
      // Firebase mode: additive merge only (Firebase is the source of truth).
      QUESTIONS.forEach(q=>{
        STATE.data[q.key] = STATE.data[q.key] || {};
        Object.assign(STATE.data[q.key], bucket[q.key] || {});
      });
    } else {
      // Local-only: bucket is authoritative.
      const next = { q1:{}, q2:{} };
      QUESTIONS.forEach(q=>{
        next[q.key] = Object.assign({}, bucket[q.key] || {});
      });
      STATE.data = next;
    }
  }catch(e){ console.warn('[RevTrn] local poll error:', e.message); }
  renderAll();
}

let _renderScheduled = false;
function renderAllDebounced(){
  if(_renderScheduled) return;
  _renderScheduled = true;
  requestAnimationFrame(()=>{
    _renderScheduled = false;
    try{ renderAll(); }catch(e){ console.error('renderAll failed:', e); }
  });
}

function startLocalSync(){
  pullLocal();
  if(!STATE.db){
    STATE.localPoll = setInterval(()=>{ pullLocal(); renderAllDebounced(); }, 1500);
  }
  window.addEventListener('storage', ()=>{ pullLocal(); renderAllDebounced(); });

  try{
    if(typeof BroadcastChannel !== 'undefined'){
      const bc = new BroadcastChannel(BC_NAME);
      bc.addEventListener('message', ev=>{
        const m = ev.data || {};
        if(m.type === 'submit' && m.qKey && m.uuid && m.data){
          STATE.data[m.qKey] = STATE.data[m.qKey] || {};
          STATE.data[m.qKey][m.uuid] = m.data;
          renderAllDebounced();
        } else if(m.type === 'reset'){
          if(m.qKey){ STATE.data[m.qKey] = {}; } else { STATE.data = { q1:{}, q2:{} }; }
          renderAllDebounced();
        } else if(m.type === 'reset-uuid' && m.uuid){
          Object.keys(STATE.data).forEach(qk=>{
            if(STATE.data[qk] && STATE.data[qk][m.uuid]) delete STATE.data[qk][m.uuid];
          });
          renderAllDebounced();
        }
      });
      STATE.bc = bc;
    }
  }catch(e){ console.warn('[RevTrn] BroadcastChannel unavailable:', e.message); }
}

function initFirebase(){
  startLocalSync();
  try{
    if(!window.firebase) throw new Error('SDK missing');
    if(FIREBASE_CONFIG.apiKey.includes('Demo-Replace')){
      setStatus('Local mode \u00b7 no Firebase', 'warn');
      STATE.db = null;
      return;
    }
    const app = firebase.initializeApp(FIREBASE_CONFIG, 'revtrn-dash');
    const db  = firebase.database(app);
    STATE.db  = db;
    db.ref('.info/connected').on('value', snap=>{
      STATE.online = !!snap.val();
      if(STATE.online) setStatus('Live \u00b7 streaming', null);
      else setStatus('Reconnecting\u2026', 'warn');
    });
    QUESTIONS.forEach(q=>{
      db.ref(`${FB_ROOT}/${q.key}`).on('value', snap=>{
        const remote = snap.val() || {};
        STATE.data[q.key] = Object.assign({}, STATE.data[q.key] || {}, remote);
        renderAllDebounced();
      });
    });
  }catch(e){
    console.warn('[RevTrn] Firebase init failed:', e.message);
    setStatus('Local mode \u00b7 no cloud', 'warn');
    STATE.db = null;
  }
}

// =====================================================================
// RENDER
// =====================================================================
function renderNav(){
  const list = document.getElementById('navList');
  list.innerHTML = QUESTIONS.map((q,i)=>{
    const n = Object.keys(STATE.data[q.key]||{}).length;
    const plain = q.title.replace(/<[^>]+>/g,'');
    return `<button class="nav-btn ${i===STATE.cur?'active':''}" data-idx="${i}" type="button">
      <span class="ix">Q${i+1}.</span>${q.tag}
      <span class="meta">${n} response${n===1?'':'s'} \u00b7 ${plain.slice(0,50)}${plain.length>50?'\u2026':''}</span>
    </button>`;
  }).join('');
  list.querySelectorAll('.nav-btn').forEach(b=>{
    b.addEventListener('click', ()=>{ STATE.cur = +b.dataset.idx; renderAll(); });
  });
  const uuids = new Set();
  Object.values(STATE.data).forEach(bucket=>{
    if(!bucket) return;
    Object.keys(bucket).forEach(u=>uuids.add(u));
  });
  document.getElementById('uniqueCount').textContent = uuids.size;
}

function renderAll(){
  renderNav();
  const q = QUESTIONS[STATE.cur];
  const bucket = STATE.data[q.key] || {};
  const entries = Object.entries(bucket);
  const n = entries.length;

  // Per-option tallies
  const counts = new Array(q.options.length).fill(0);
  entries.forEach(([,v])=>{
    if(v && typeof v.idx === 'number' && v.idx >= 0 && v.idx < counts.length) counts[v.idx]++;
  });

  // KPI tiles: Responded + Leading answer (no fixed "expected" target — count grows organically)
  let topIdx = -1, topCount = 0;
  counts.forEach((c,i)=>{ if(c > topCount){ topCount = c; topIdx = i; } });
  const topPct = n ? Math.round((topCount/n)*100) : 0;
  const topCard = (n > 0 && topIdx >= 0) ? `
    <div class="kpi-box ${q.options[topIdx].color === 'gold' ? 'yellow' : q.options[topIdx].color}">
      <div class="lbl">Leading answer</div>
      <div class="val">${q.options[topIdx].letter}</div>
      <div class="sub">${escapeHtml(q.options[topIdx].label)} \u00b7 ${topPct}% \u00b7 ${topCount}/${n}</div>
    </div>` : '';

  const kpiRow = `
    <div class="kpi-row">
      <div class="kpi-box">
        <div class="lbl">Responded</div>
        <div class="val">${n}</div>
        <div class="sub">attendee${n===1?'':'s'} so far</div>
      </div>
      ${topCard}
    </div>
  `;

  // Bars block — % + absolute per option
  const bars = q.options.map((opt,i)=>{
    const c   = counts[i];
    const pct = n ? Math.round((c/n)*100) : 0;
    const pctStr = pct>0 ? pct+'%' : '';
    return `
      <div class="bar-row">
        <div class="lbl"><span class="letter">${opt.letter}.</span>${escapeHtml(opt.label)}</div>
        <div class="bar-track"><div class="bar-fill ${opt.color}" style="width:${pct}%">${pctStr}</div></div>
        <div class="pct">${c} \u00b7 ${pct}%</div>
      </div>`;
  }).join('');

  const body = n === 0 ? emptyState() : `
    <div class="card">
      <h3>Distribution of answers</h3>
      <div class="bar-list">${bars}</div>
    </div>
  `;

  document.getElementById('mainArea').innerHTML = `
    <div class="qref">${q.tag} \u00b7 Question ${STATE.cur+1} of ${QUESTIONS.length}</div>
    <div class="tag-pill">${q.tag}</div>
    <h1 class="section-title">${q.title}</h1>
    <p class="sub-prompt">${q.subPrompt}</p>
    ${kpiRow}
    ${body}
    ${resetPanel(q)}
  `;

  const rOne = document.getElementById('reset-one');
  if(rOne) rOne.addEventListener('click', ()=>resetQuestion(q.key));
  const rAll = document.getElementById('reset-all');
  if(rAll) rAll.addEventListener('click', ()=>resetAll());
}

function emptyState(){
  return `<div class="empty-state"><span class="big">\u00b7</span>No responses yet \u2014 waiting for attendees to submit.</div>`;
}

function resetPanel(q){
  return `
    <div class="reset-ctrl">
      <div class="reset-head">
        <h4>Clear responses</h4>
        <span class="reset-hint">Use between sessions or rehearsals. Clears Firebase + local data on this browser.</span>
      </div>
      <div class="reset-row">
        <button class="reset-btn" id="reset-one" type="button">\u21BB Clear Question ${STATE.cur+1}</button>
        <button class="reset-btn danger" id="reset-all" type="button">\u26A0 Clear ALL answers</button>
      </div>
    </div>
  `;
}

function resetQuestion(qKey){
  const idx = QUESTIONS.findIndex(x=>x.key===qKey);
  const label = idx >= 0 ? `Question ${idx+1} (${QUESTIONS[idx].tag})` : qKey;
  if(!confirm(`Clear all responses for ${label}?\n\nThis deletes the answers from every device. Cannot be undone.`)) return;
  if(STATE.db){ STATE.db.ref(`${FB_ROOT}/${qKey}`).remove(); }
  purgeLocal(qKey);
  STATE.data[qKey] = {};
  try{ if(STATE.bc) STATE.bc.postMessage({type:'reset', qKey}); }catch(e){}
  renderAll();
}
function resetAll(){
  if(!confirm(`Clear ALL responses for session "${SESSION_ID}"?\n\nEvery answer from every attendee on every device will be erased. Cannot be undone.`)) return;
  if(STATE.db){ STATE.db.ref(FB_ROOT).remove(); }
  purgeLocal(null);
  STATE.data = { q1:{}, q2:{} };
  try{ if(STATE.bc) STATE.bc.postMessage({type:'reset'}); }catch(e){}
  renderAll();
}
function purgeLocal(qKey){
  try{
    if(qKey){
      const b = JSON.parse(localStorage.getItem(BUCKET_KEY) || '{}');
      delete b[qKey];
      localStorage.setItem(BUCKET_KEY, JSON.stringify(b));
    } else {
      localStorage.removeItem(BUCKET_KEY);
    }
  }catch(e){}
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// =====================================================================
// INIT
// =====================================================================
window.addEventListener('error', e=>{
  console.error('[RevTrn] fatal:', e.error || e.message);
});

try{ initFirebase(); }catch(e){ console.warn('initFirebase threw:', e); setStatus('Local mode \u00b7 no cloud','warn'); }
try{ renderAll(); }catch(e){ console.error('initial renderAll failed:', e); }
</script>
